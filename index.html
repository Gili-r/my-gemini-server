        body, html {

        /* Resizer Styles */
        .resizer {
            width: 8px;
            background-color: #e5e7eb;
            cursor: col-resize;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
            z-index: 10;
        }
        .resizer:hover, .resizer.active {
            background-color: #3b82f6;
        }
        .resizer::after {
            content: "⋮";
            color: #9ca3af;
            font-size: 20px;
        }
        .resizer:hover::after, .resizer.active::after {
            color: white;
        }

        body.is-resizing iframe {

            border-collapse: collapse;

            padding: 0.5rem;

        .markdown-body th {
            background-color: #f3f4f6;
        }
        .markdown-body pre {

            padding: 0.75rem;
            border-radius: 0.375rem;

        .markdown-body pre code {

            padding: 0;
        }
        .markdown-body p {
            margin-bottom: 0.5rem;
        }

        .loader {

            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 20px;
            height: 20px;

        function createMessageBubble(role) {

        // מחליף את fetchGeminiResponse: קורא את הזרם מגוגל ומפענח אותו חי
        async function fetchGeminiStream(contents, systemInstructionText, onUpdate) {
            const payload = {
                contents: contents,
                systemInstruction: { parts: [{ text: systemInstructionText }] }
            };

            const response = await fetch(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.status === 429) throw new Error("המורה עמוס כרגע... אנא המתן כ-30 שניות ונסה שוב.");
            if (response.status === 503) throw new Error("השרתים של גוגל בעומס עולמי. אל דאגה, נסה שוב בעוד דקה.");
            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `שגיאה בתקשורת (${response.status})`);
            }

            // מכינים כלים לקריאת הסטרים
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullText = '';
            let buffer = '';

            // לולאה שרצה כל עוד השרת ממשיך לשלוח נתונים
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // מפענחים את החתיכה שהגיעה
                buffer += decoder.decode(value, { stream: true });
                
                // הנתונים מגיעים בשורות. נפריד אותם (ונשמור שורה חלקית בבאפר אם יש)
                const lines = buffer.split('\n');
                buffer = lines.pop(); 

                for (const line of lines) {
                    if (line.trim().startsWith('data:')) {
                        const dataStr = line.replace(/^data:\s*/, '').trim();
                        if (!dataStr || dataStr === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(dataStr);
                            const chunkText = parsed.candidates?.[0]?.content?.parts?.[0]?.text || '';
                            if (chunkText) {
                                fullText += chunkText;
                                // קוראים לפונקציית העדכון כדי להציג מיד את המילים החדשות על המסך
                                if (onUpdate) onUpdate(fullText); 
                            }
                        } catch (e) {
                            // מתעלמים משורות שאינן JSON (כמו רווחים שגוגל שולח לפעמים)
                        }
                    }
                }
            }
            return fullText; // מחזירים את התשובה המלאה בסוף כדי לשמור בהיסטוריה
        }

        // מחליף את handleSend: משתמש בסטרים כדי לכתוב בזמן אמת

                const contents = chatHistory.map(msg => ({
                    role: msg.role === 'user' ? 'user' : 'model',
                    parts: [{ text: msg.text }]
                }));
                const selectedTutorId = document.getElementById('tutor-select').value;
                const currentSystemPrompt = prompts[selectedTutorId];

                // 2. שולחים את הבקשה לסטרים עם callback שמעדכן את המסך
                const fullResponseText = await fetchGeminiStream(contents, currentSystemPrompt, (currentText) => {
                    loadingIndicator.classList.add('hidden'); // מעלימים את הלודר ברגע שהמילה הראשונה מגיעה!
                    modelBubble.innerHTML = marked.parse(currentText);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                });

                // 3. שומרים בהיסטוריית השיחה רק כשהכל הסתיים לחלוטין
                chatHistory.push({ role: 'model', text: fullResponseText });

            } catch (error) {
                console.error("Detailed Fetch Error:", error);
                appendMessage('model', "⚠️ " + error.message);
            } finally {
                loadingIndicator.classList.add('hidden');
                document.getElementById('send-btn').disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        }
		
		// משתנה לשמירת הדו"ח השלם כדי שנוכל להעתיק אותו

                lastGeneratedSummary = summaryText; // שמירה בזיכרון להעתקה

// לוגיקת שינוי גודל הפאנלים (מותאם ל-RTL + צמצום והרחבה + מניעת חללים ריקים)
        function initResize(resizer, targetPanel, adjacentPanel) {
            let isCollapsed = false;
            let previousTargetWidth = '';
            let previousAdjacentWidth = '';

            // 1. פיצ'ר לחיצה כפולה לצמצום/הרחבה
            resizer.addEventListener('dblclick', () => {
                if (!isCollapsed) {
                    const parentWidth = targetPanel.parentElement.offsetWidth;
                    const targetPercent = (targetPanel.offsetWidth / parentWidth) * 100;
                    const adjacentPercent = (adjacentPanel.offsetWidth / parentWidth) * 100;

                    previousTargetWidth = targetPanel.style.width || `${targetPercent}%`;
                    previousAdjacentWidth = adjacentPanel.style.width || `${adjacentPercent}%`;

                    targetPanel.style.width = '0px';
                    targetPanel.style.overflow = 'hidden'; 
                    targetPanel.style.padding = '0';
                    targetPanel.style.border = 'none'; // למניעת קו שוליים שנתקע
                    
                    // מעבירים את כל הרוחב של הפאנל שצומצם אל הפאנל השכן!
                    adjacentPanel.style.width = `${targetPercent + adjacentPercent}%`;
                    adjacentPanel.style.flex = 'none';

                    isCollapsed = true;
                } else {
                    targetPanel.style.width = previousTargetWidth;
                    targetPanel.style.padding = ''; 
                    targetPanel.style.border = '';
                    adjacentPanel.style.width = previousAdjacentWidth;
                    isCollapsed = false;
                }
            });

            // 2. טיפול בגרירה ותיקון "בליעת" העכבר
            resizer.addEventListener('mousedown', (e) => {
                e.preventDefault(); 
                const startX = e.clientX;
                const startTargetWidth = targetPanel.offsetWidth;
                const startAdjacentWidth = adjacentPanel.offsetWidth;
                const totalWidthPx = startTargetWidth + startAdjacentWidth; // סך כל הרוחב של שני הפאנלים יחד
                const parentWidth = targetPanel.parentElement.offsetWidth;

                // הפתרון לבאג: כיבוי זמני של כל ה-iframes בזמן הגרירה
                const iframes = document.querySelectorAll('iframe');
                iframes.forEach(iframe => iframe.style.pointerEvents = 'none');

                const onMouseMove = (e) => {
                    const dx = e.clientX - startX; 
                    
                    // ב-RTL תזוזה ימינה (dx חיובי) מקטינה את הפאנל הימני ומגדילה את השמאלי
                    let newTargetWidthPx = startTargetWidth - dx;
                    let newAdjacentWidthPx = startAdjacentWidth + dx;

                    // הגדרת גבולות (מינימום 10% כדי שפאנל לא יעלם לגמרי בטעות)
                    const minPx = parentWidth * 0.1;
                    const maxPx = totalWidthPx - minPx;

                    if (newTargetWidthPx < minPx) {
                        newTargetWidthPx = minPx;
                        newAdjacentWidthPx = maxPx;
                    } else if (newTargetWidthPx > maxPx) {
                        newTargetWidthPx = maxPx;
                        newAdjacentWidthPx = minPx;
                    }

                    // העברת הרוחב לאחוזים (כדי שאם התלמיד יגדיל את חלון הדפדפן, הפרופורציות יישמרו)
                    const targetPercent = (newTargetWidthPx / parentWidth) * 100;
                    const adjacentPercent = (newAdjacentWidthPx / parentWidth) * 100;

                    targetPanel.style.width = `${targetPercent}%`;
                    adjacentPanel.style.width = `${adjacentPercent}%`;
                    
                    targetPanel.style.flex = 'none'; 
                    adjacentPanel.style.flex = 'none'; 

                    // אם המשתמש התחיל לגרור ידנית כשהחלון היה מצומצם, נבטל את מצב הצמצום
                    if (isCollapsed) {
                        targetPanel.style.overflow = '';
                        targetPanel.style.padding = '';
                        targetPanel.style.border = '';
                        isCollapsed = false;
                    }
                };

                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    document.body.style.cursor = 'default';
                    
                    iframes.forEach(iframe => iframe.style.pointerEvents = 'auto');
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.body.style.cursor = 'col-resize';
            });
        }

        // הפעלת הפונקציה על שני הפסים המפרידים
        initResize(document.getElementById('resizer1'), document.getElementById('panel1'), document.getElementById('panel2'));
        initResize(document.getElementById('resizer2'), document.getElementById('panel2'), document.getElementById('panel3'));
    </script>
